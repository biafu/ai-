spring:
  application:
    name: ai-code-helper-2
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
server:
  port: 8080
langchain4j:
  community:
    dashscope:
      chat-model:
       model-name: qwen-max
       api-key: <your api key>
      embedding-model:
        model-name: text-embedding-v4
        api-key: <your api key>
      streaming-chat-model:
        model-name: qwen-max
        api-key: <your api key>
bigmodel :
    api-key: <your api key>
rag:
  document-dir: src/main/resources/doce
  max-files: 10
  max-file-size-mb: 20
  allowed-extensions: 
    - txt
    - md
    - pdf
    - docx
